adaptive_remote_validation_task:
  description: >
    Retrieve model_id_list/family_md/family_index_js/request config from memory and validate command correctness on remote local-bkc service.
    Rewrite per-model request content from canonical family artifacts (README.md + index.js) while preserving full family context.
    Before sending requests, call memory_preview_remote_content to inspect exactly what content will be sent for each model.
    Ensure each request content only contains single-model information (filtered by model_id/model_name), not merged multi-model sections.
    Enforce one request per model content; continue processing all models even if some fail.
    Persist per-index validation trace using memory_store_execution_result:
    - executed_command
    - execution_result
    - fail_reason_list
    Keep index completeness for all models.
  expected_output: >
    GLOBAL_MEMORY contains full per-model remote validation traces with index-complete executed_command/execution_result/fail_reason_list.
  agent: remote_execution_agent
