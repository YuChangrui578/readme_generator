input_parse_task:
  description: >
    Complete input parsing and memory storage in strict sequence:
    Call get_input_text to obtain input_text from GLOBAL_MEMORY.
    Execute parse_input_text to process input_text and output two structured results: model_list and github_url (both as lists).
    Enforce github_url alignment with model_list length:
    - If github_url is shorter, pad with empty strings "" for official-sglang models.
    - If only one github_url is provided for a mixed official/dev series, place it on the last model and fill previous with "".
    Invoke store_memory to save the parsed model_list and github_url into GLOBAL_MEMORY.
    Verify data standardization: ensure both fields are valid lists with proper default values if empty.
    The final GLOBAL_MEMORY shall contain:
    model_list (parsed list of model information)
    github_url (parsed list of GitHub URL information)
  expected_output: >
    Global memory updated with parsed structured data:
    input_text successfully fetched from GLOBAL_MEMORY
    model_list generated and stored
    github_url generated and stored
    All parsed data is standardized and ready for downstream agent tasks.
  agent: input_parser_agent
