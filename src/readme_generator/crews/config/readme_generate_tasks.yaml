adaptive_readme_generation_task:
  description: >
    Generate aligned family README.md + index.js using agent-native reasoning as the primary generation engine.
    Retrieve full generation context from memory, including ref_md, ref_index_js, model_list, and model_id_list.
    Keep generation aligned to the model family context and ensure JS logic is fully handled (not markdown-only reasoning).
    Do not copy the reference content blindly. The output must align to the current input models.
    Store outputs with memory_store_family_artifacts(family_md, family_index_js), then ensure family_content is present.
  expected_output: >
    GLOBAL_MEMORY contains aligned family_md, family_index_js, and family_content.
  agent: readme_generator_agent
