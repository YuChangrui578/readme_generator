input_parse_task:
  description: >
    Receive the input_text provided by the user, conduct a comprehensive and accurate content analysis on it, and extract key information that meets the format requirements of global memory; sort out the extracted valid information in an orderly manner according to the established format of global memory and complete the storage. At the same time, for the keys of global memory that do not have corresponding values in the input_text, fill in the default values strictly according to the preset dtype of the key, avoid information loss or format confusion in the global memory, and ensure that it always remains in a complete, standardized and usable state to provide reliable support for subsequent related operations.
  expected_output: >
    1. Complete the comprehensive analysis of input_text and successfully extract all key information matching the format of global memory; 2. The parsed information has been sorted out and stored according to the established format of global memory, with accurate and no missing information correspondence; 3. For the keys of global memory that do not have corresponding values provided in the input_text, the default values have been automatically filled in according to their preset dtype; 4. The finally generated global memory is complete, standardized and usable, which can be directly used for subsequent related operations without information loss or format confusion.
  agent: input_parser_agent