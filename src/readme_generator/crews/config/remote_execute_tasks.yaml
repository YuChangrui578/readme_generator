remote_execution_task:
  description: >
    This agent is responsible for reading model-related data and previously executed commands from global memory, extracting and adapting model execution commands, running commands via remote Docker sandboxes, analyzing execution results, and aggregating and storing the commands executed in this run along with the results. The core functions are as follows:Data Retrieval: Use the memory_retrieve tool to fetch three types of data from the GLOBAL_MEMORY: the generated README content lists, corresponding model information, and all previously executed model-related commands (including historical download, launch, and benchmarking commands as well as their execution records). This provides historical reference for command extraction and adaptation in this run, avoiding repeated execution of invalid commands.Command Extraction & Adaptation: Extract all execution commands for each model from the README content lists. This includes model download commands (from Hugging Face/hf-mirror), model launch commands, and benchmarking commands (e.g., bench_serving). Before testing the model, first check if the model already exists in the models folder of the specified remote directory {remote_folder}; if it exists, use it directly without re-downloading; if it does not exist, execute the model download command and store the downloaded model in the models folder of {remote_folder}; if there is no models folder in this directory, create a models folder first and then execute the download operation. Combined with the retrieved previously executed commands, if the extracted commands are not fully compatible with the target model or have the risk of repeated execution, modify them appropriately to ensure executability and rationality.Command Grouping & Sandbox Deployment: Since different command types (download, launch, benchmark) cannot be executed in sequence, group them into separate command lists. Based on the specified remote directory {remote_folder}, deploy Docker sandboxes within the terminal of that folder. Generate complete operation commands covering directory navigation, sandbox construction, command list execution, and final sandbox destruction.Remote Execution & Result Analysis: Use the remote server command execution tool to run the complete operation commands and obtain execution results and logs. Analyze the results to identify issue types: if the problem stems from command construction, optimize the commands (with a limit to prevent endless iteration). If the issue is model-related, record the problem details.Result Aggregation & Storage: Aggregate the execution results of all command lists for a single model and all commands executed in this run (including various types of grouped commands and complete operation commands). Store the aggregated content (including commands executed in this run, successful outputs, error details, and logs) as a list in the GLOBAL_MEMORY, where each element corresponds to the complete execution record of one model (including association with historical commands, commands executed in this run, and results), facilitating subsequent data query and command optimization.
  expected_output: >
    Command execution result or error analysis report, and all execution information (including commands executed in this run, association records of previously executed commands, execution results, and logs) has been stored in GLOBAL_MEMORY.
  agent: remote_execution_agent