readme_generate_task:
  description: >
    First, use the Get Reference Example tool to obtain the required reference_example_list through the given github_url list. It should be noted that the length of reference_example_list is consistent with that of model_list, and each element in reference_example_list corresponds one-to-one to each element in model_list by index — the first element of model_list corresponds to the first element of reference_example_list, the second element of model_list corresponds to the second element of reference_example_list, and so on.Then, use the memory_retrieve tool to automatically retrieve model_url_list and model_id_list from GLOBAL_MEMORY. Note that model_name_list is the same as model_list, so we use model_list uniformly for processing without distinguishing between the two.Taking the corresponding element in reference_example_list as a template (matching by index), generate a complete and standardized README document for each element (each model) in model_list. When generating the README, the model-related information involved in the template should be replaced with the corresponding element in model_list, model_url_list, and model_id_list (matching by index).Output a list of README contents, where the length of this list is consistent with that of model_list, and each element corresponds one-to-one to model_list, model_url_list, model_id_list, and reference_example_list by index.Finally, use the memory_store tool to save the generated README content list into GLOBAL_MEMORY, and the storage key is specified as model_readme. The length of model_readme is the same as that of model_list, and each element in model_readme corresponds one-to-one to each model in model_list by index, which is used for subsequent execution and call.
  expected_output: >
    A list of complete, structured model README contents, with each README corresponding to one model and its corresponding reference example in model_name_list, model_url_list, model_id_list and reference_example_list. All contents are synchronized to GLOBAL_MEMORY.
  agent: readme_generator_agent