model_search_task:
  description: >
    Use the memory_retrieve tool to get model_list from GLOBAL_MEMORY. Use the huggingface_model_batch_search tool to perform accurate batch retrieval for all models in model_list, obtain the official Hugging Face model_id and URL for each model, and form model_id_list and model_url_list. Finally, use the memory_store tool to store the two lists into GLOBAL_MEMORY to ensure the data is available for subsequent tasks.
  expected_output: >
    Complete and valid model_id_list and model_url_list, all data has been retrieved officially from Hugging Face, correctly matched with model_list, and persisted in GLOBAL_MEMORY for use by readme_generator_agent and other downstream agents.
  agent: model_search_agent