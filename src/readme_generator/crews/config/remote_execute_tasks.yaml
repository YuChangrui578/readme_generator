remote_execution_task:
  description: >
    This agent orchestrates the end-to-end validation process for **ALL** models listed in `GLOBAL_MEMORY.model_id`. It must iterate through each model sequentially, ensuring no model is skipped. For each model, it uses the `build_command` tool to extract instructions from `model_readme`, adapts commands based on context (especially quantization suffixes and model availability), executes them via remote Docker sandboxes, and updates `GLOBAL_MEMORY` with results.

    **Core Workflow:**

    **1. Sequential Iteration (Strict)**
    - Retrieve the full list of `model_id`s and `model_url_list` from `GLOBAL_MEMORY`.
    - **Loop through every model** in `model_id` by index `i`. Do NOT stop after the first model.
    - For each model, perform steps 2-7 below.

    **2. Data Retrieval & Context Awareness**
    For the current model index `i`:
    - Fetch `model_readme[i]`, `github_url[i]`, and `model_url_list[i]`.
    - Fetch historical records (`executed_command`, `execution_result`, `fail_reason_list`) to avoid repeating known errors.

    **3. Environment Construction Phase**
    Determine the environment strategy based on `github_url[i]`:
    - **Official CPU sglang**: If the URL is empty, call "Get SGLANG Environment" for standard activation.
    - **Custom/Third-party Models**: If the URL is non-empty:
      1. Navigate to `{remote_folder}/dev`.
      2. Clone the repository.
      3. **Call `build_command` tool**: Pass `model_readme[i]` and `option="build_sglang_env"` to extract build commands.
      4. **Execute Build with Debugging**:
         - Attempt to build the environment.
         - **Retry Logic**: If the build fails, analyze the error, fix the command (e.g., proxy issues, dependency conflicts), and retry.
         - **Max Retries**: Allow a maximum of **2 retries**. If it fails after the 2nd retry, mark the environment build as **FAILED**, record the reason in `fail_reason_list[i]`, and **skip to the next model**. Do not proceed to testing if the environment cannot be built.

    **4. Test Command Extraction, Correction, and Adaptation (Core Logic)**
    - **Extraction**: **Call `build_command` tool**: Pass `model_readme[i]` and `option="test_model_building"` to retrieve raw download, launch, and test commands.
    - **Model Availability Check**:
      - Check if the specific model defined by `model_id[i]` exists in `{remote_folder}/models`.
      - **Crucial**: Do NOT rely on whatever files happen to be in `{remote_folder}/models`. Only process the model specified in `model_id[i]`.
      - **If Missing**: Use `model_url_list[i]` to download the model from Hugging Face into `{remote_folder}/models`. Ensure the download completes before proceeding.
      - **If Present**: Verify the model name matches `model_id[i]`. If it matches, skip downloading. Ignore any other models in the folder that are not in `model_id`.
    - **Correction & Adaptation (Fix & Adapt)**:
      1. **Quantization Fix (Critical)**:
         - Determine if the model is quantized by checking the **suffix** of `model_id[i]` (e.g., `-fp8`, `-int8`, `-awq`, `-w8a8_int8`) or explicit instructions in `model_readme[i]`.
         - **Rule**: The `--quantization` parameter must correspond to the **actual model being processed** (identified by `model_id[i]`).
         - If the `model_id` suffix indicates quantization, inject the correct `--quantization <precision>` argument into the launch command.
         - If the `model_id` has NO quantization suffix, ensure NO `--quantization` flag is added, even if other quantized models exist in the folder.
      2. **Bug Fixing**:
         - Compare with historical failures. Fix syntax/logic errors.
      3. **README Content Write-back**:
         - If substantial fixes are made, update `model_readme[i]` in `GLOBAL_MEMORY` with the corrected commands.

    **5. Command Grouping & Sandbox Execution**
    Group corrected commands into: [Download (if needed)], [Launch], [Benchmark].
    Construct a Shell script:
    - Navigate to `{remote_folder}/dev`.
    - Activate environment/start sandbox.
    - Execute commands sequentially.
    - Clean up resources.

    **6. Remote Execution & Closed-Loop Feedback**
    - Execute the script.
    - **Failure Handling**:
      - If "command error": Fix command, update `model_readme`, and retry (max 2 retries total for test phase).
      - If "unfixable error": Record root cause in `fail_reason_list[i]` and move to the next model.

    **7. Result Aggregation & Storage (Strict Constraints)**
    Update `GLOBAL_MEMORY` lists at index `i`:
    - **`executed_command[i]`**: Store the final reproducible command chain (joined by `&&`).
    - **`execution_result[i]`**: Store concise execution summary.
    - **`fail_reason_list[i]`**: Store detailed error reason if failed; otherwise empty/null.
    - **`model_readme[i]`**: Store the updated README text if fixes were applied.

    **Important**: The agent must continue this loop until ALL models in `model_id` are processed, regardless of individual failures.

  expected_output: >
    A status report summarizing the processing of the **current model** in the iteration.
    
    Note: The agent is responsible for iterating through the entire `model_id` list. This output reflects the result of the specific model currently being handled.
    
    Key points to include:
    1. Whether the model was downloaded (if missing) or used from cache.
    2. Whether quantization parameters were correctly added based on the `model_id` suffix.
    3. Whether the build/test required retries (and if it failed after 2 attempts).
    4. Final status (Success/Failed) and any error details.
    
    All persistent data is stored in GLOBAL_MEMORY lists corresponding to the current model's index.

  agent: remote_execution_agent