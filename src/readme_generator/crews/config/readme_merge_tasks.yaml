readme_merge_task:
  description: >
    1. Use the memory_retrieve_merge_context tool to retrieve three key pieces of information from GLOBAL_MEMORY: model_list (list of models in the same series, e.g., Llama3 with different precisions like fp8, int4, fp16), model_readme (list of individual model READMEs, one-to-one index matching with model_list), and merged_reference_example (merge reference template).
    2. Verify the index correspondence: ensure each individual README in model_readme corresponds to the model in model_list one-to-one by index, and confirm the merged_reference_example is valid and usable.
    3. Perform intelligent README merging: refer strictly to the structure and format of merged_reference_example, merge all individual model READMEs into one unified model series README. During the merging process, maintain consistent descriptions of the entire model series, eliminate redundant content, and clearly highlight differences in precision, performance, and usage scenarios between different model versions.
    4. Ensure the merged README is logically coherent, formatted standardized, and fully consistent with the style of the merged_reference_example.
    5. Finally, use the memory_store_merged_readme tool to save the final merged README into GLOBAL_MEMORY with the key "merged_readme", ensuring it can be directly called by subsequent tasks (e.g., GitHub PR submission).
  expected_output: >
    1. A complete, unified model series README document, which strictly follows the structure and format of merged_reference_example in GLOBAL_MEMORY.
    2. The merged README maintains consistent descriptions of the entire model series, clearly presents differences between different model versions (precision, performance, usage scenarios), and has no redundant or conflicting content.
    3. The merged README has been successfully stored in GLOBAL_MEMORY with the key "merged_readme", and can be directly used for subsequent related processes (e.g., GitHub PR upload) without format errors or information missing.
  agent: merge_readme_agent