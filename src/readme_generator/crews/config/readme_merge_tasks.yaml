readme_merge_task:
  description: >
    Receive a list of model names {model_list}, which belong to the same model series (such as Llama3 with different precisions like fp8, int4, fp16). It should be noted that the independent README content corresponding to each model is stored in the model_readme field of GLOBAL_MEMORY, and you need to first use the memory_retrieve tool to extract the README content of each model from this field.After extraction, refer to the merge example stored in the merged_reference_example field of GLOBAL_MEMORY, and merge all individual model READMEs into one unified, structured, and complete README document. During the merging process, you need to maintain the consistency of the descriptions of each model, while highlighting the differences in precision, performance, and usage scenarios among different versions to ensure that the merged document is logically coherent and formatted standardized.After the merging is completed, use the memory_store tool to save the final merged README into GLOBAL_MEMORY for subsequent task calls.
  expected_output: >
    A complete merged README document for the entire model series, with a unified structure, clear comparison of differences between versions, and a standardized format strictly referring to the example in the merged_reference_example field of GLOBAL_MEMORY. The merged content has been successfully stored in GLOBAL_MEMORY and can be directly used for subsequent related processes.
  agent: merge_readme_agent